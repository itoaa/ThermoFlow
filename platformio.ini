; ThermoFlow PlatformIO Configuration - Arduino Framework
; ESP32-S3 Climate Monitoring and Control System

[platformio]
src_dir = src
lib_dir = lib
include_dir = include

[env:esp32-s3]
platform = espressif32@6.13.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

; Build flags
build_flags = 
    -Wall
    -Wextra
    -DPROJECT_VERSION=\"1.0.0\"
    -DPROJECT_NAME=\"ThermoFlow\"
    -DCONFIG_FREERTOS_MAX_TASK_NAME_LEN=16
    -DCONFIG_FREERTOS_HZ=1000
    -DCONFIG_LWIP_DHCP_COARSE_TIMER_SECS=1
    -DCONFIG_TCP_OVERSIZE_MSS=1
    -I${PROJECT_DIR}/include
    -I${PROJECT_DIR}/lib/sht4x_sensor/include
    -I${PROJECT_DIR}/lib/fan_control/include
    -I${PROJECT_DIR}/lib/mqtt_client/include
    -I${PROJECT_DIR}/lib/web_server/include
    -I${PROJECT_DIR}/lib/security_utils/include
    -I${PROJECT_DIR}/lib/display_driver/include
    -I${PROJECT_DIR}/lib/anti_condensation/include
    -I${PROJECT_DIR}/lib/sensor_manager/include
    -I${PROJECT_DIR}/lib/rate_limiter/include
    -I${PROJECT_DIR}/lib/audit_log/include

; Library dependencies
lib_deps = 
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit SSD1306@^2.5.0
    adafruit/Adafruit GFX Library@^1.11.0

; Extra lib directories
lib_extra_dirs = 
    ${PROJECT_DIR}/lib

[env:esp32-s3-release]
extends = env:esp32-s3
build_type = release
build_flags = 
    ${env:esp32-s3.build_flags}
    -O2
    -DNDEBUG

[env:esp32-s3-debug]
extends = env:esp32-s3
build_type = debug
build_flags = 
    ${env:esp32-s3.build_flags}
    -O0
    -g3
    -DDEBUG