; ThermoFlow PlatformIO Configuration
; ESP32-S3 Climate Monitoring and Control System

[platformio]
src_dir = src
include_dir = include
lib_dir = lib

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

; Build settings
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.partitions = default_8MB.csv

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

; Build flags for security and debugging
build_flags = 
    -Wall
    -Wextra
    -Werror=return-type
    -DCONFIG_MBEDTLS_TLS_CLIENT_ONLY=1
    -DCONFIG_ESP_TLS_SERVER=y
    -DPROJECT_VERSION=\"1.0.0\"
    -DPROJECT_NAME=\"ThermoFlow\"
    -DLOG_LOCAL_LEVEL=ESP_LOG_INFO

; Security features
board_build.embed_txtfiles = 
    src/web/index.html
    src/web/style.css
    src/web/script.js

; Partition table for 8MB flash with OTA
board_build.partitions = partitions_8MB.csv

; Upload settings
upload_speed = 921600

; Debug settings
debug_tool = esp-builtin
debug_init_break = break main

[env:esp32-s3-release]
extends = env:esp32-s3
build_type = release
build_flags = 
    ${env:esp32-s3.build_flags}
    -O2
    -DNDEBUG

[env:esp32-s3-debug]
extends = env:esp32-s3
build_type = debug
build_flags = 
    ${env:esp32-s3.build_flags}
    -O0
    -g3
    -DDEBUG
    -DCONFIG_LOG_DEFAULT_LEVEL=5

; Test environment
[env:native-test]
platform = native
test_framework = unity
build_type = test