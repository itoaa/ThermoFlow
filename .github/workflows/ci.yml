name: ThermoFlow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.1
          target: esp32s3
          path: '.'
          command: bash .github/ci-build.sh

      - name: Show build log tail
        if: failure()
        run: |
          echo "=== Last 120 lines of build.log ==="
          tail -n 120 build.log || true
          if [ -f build.log ]; then
            grep -E "error:|undefined reference|ninja: build stopped|fatal error|overflowed|will not fit" build.log | tail -n 20 | while IFS= read -r line; do
              echo "::error::$line"
            done || true
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Publish build failure summary
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## ThermoFlow CI build failed\n\n';
            try {
              const log = fs.readFileSync('build.log', 'utf8');
              const errorLines = log.split('\n').filter((line) =>
                /error:|undefined reference|ninja: build stopped|fatal error|overflowed|will not fit/i.test(line)
              );
              if (errorLines.length > 0) {
                summary += '### Errors\n\n```text\n' + errorLines.slice(-40).join('\n') + '\n```\n\n';
              }
              const tail = log.split('\n').slice(-120).join('\n');
              summary += '### Log tail (last 120 lines)\n\n```text\n' + tail + '\n```';
            } catch (err) {
              summary += `No build.log available (${err.message})`;
            }

            const summaryPath = process.env.GITHUB_STEP_SUMMARY;
            if (summaryPath) {
              fs.appendFileSync(summaryPath, summary + '\n');
            }

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: summary,
            });

      - name: Run unit tests (host build check)
        if: success()
        run: |
          echo "Unity tests are executed on-device via tests/test_main.c"
          test -f tests/test_heat_recovery.c
          test -f tests/test_sht4x.c