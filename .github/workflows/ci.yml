name: ThermoFlow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.1
          target: esp32s3
          path: '.'
          command: "SDKCONFIG_DEFAULTS=sdkconfig.defaults:sdkconfig.ci.defaults idf.py build > build.log 2>&1 || (echo '=== BUILD FAILED ===' && grep -E 'error:|undefined reference|ninja: build stopped|fatal error|overflowed|will not fit' build.log | tail -n 40 && tail -n 80 build.log && exit 1)"

      - name: Show build log tail
        if: failure()
        run: |
          echo "=== Last 120 lines of build.log ==="
          tail -n 120 build.log || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Run unit tests (host build check)
        run: |
          echo "Unity tests are executed on-device via tests/test_main.c"
          test -f tests/test_heat_recovery.c
          test -f tests/test_sht4x.c