name: ThermoFlow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.1
          target: esp32s3
          path: '.'

      - name: Run unit tests (host build check)
        run: |
          echo "Unity tests are executed on-device via tests/test_main.c"
          test -f tests/test_heat_recovery.c
          test -f tests/test_sht4x.c