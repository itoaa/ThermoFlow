<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Segoe UI, system-ui, sans-serif">
  <rect width="900" height="480" fill="#f8fafc"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">SHT40 temp/fukt-modul — pinout och Cat-kabel</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#64748b">Typisk breakout (VCC · GND · SCL · SDA). Kontrollera din modul — ordningen kan skilja.</text>

  <!-- Module PCB -->
  <rect x="280" y="90" width="340" height="200" rx="10" fill="#365314" stroke="#84cc16" stroke-width="2"/>
  <text x="450" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#ecfccb">SHT40 Breakout</text>
  <rect x="380" y="135" width="140" height="50" rx="6" fill="#1a2e05" stroke="#a3e635"/>
  <text x="450" y="165" text-anchor="middle" font-size="12" fill="#d9f99d">Sensirion SHT40</text>

  <!-- 4 pins at bottom of module -->
  <g>
    <!-- Pin pads -->
    <rect x="310" y="250" width="40" height="24" rx="3" fill="#eab308"/>
    <rect x="380" y="250" width="40" height="24" rx="3" fill="#eab308"/>
    <rect x="450" y="250" width="40" height="24" rx="3" fill="#eab308"/>
    <rect x="520" y="250" width="40" height="24" rx="3" fill="#eab308"/>
    <text x="330" y="267" text-anchor="middle" font-size="10" font-weight="700" fill="#422006">VCC</text>
    <text x="400" y="267" text-anchor="middle" font-size="10" font-weight="700" fill="#422006">GND</text>
    <text x="470" y="267" text-anchor="middle" font-size="10" font-weight="700" fill="#422006">SCL</text>
    <text x="540" y="267" text-anchor="middle" font-size="10" font-weight="700" fill="#422006">SDA</text>
  </g>

  <!-- Wires down -->
  <line x1="330" y1="274" x2="330" y2="330" stroke="#a16207" stroke-width="3"/>
  <line x1="400" y1="274" x2="400" y2="330" stroke="#16a34a" stroke-width="3"/>
  <line x1="470" y1="274" x2="470" y2="330" stroke="#ea580c" stroke-width="3"/>
  <line x1="540" y1="274" x2="540" y2="330" stroke="#2563eb" stroke-width="3"/>

  <!-- Color labels -->
  <rect x="280" y="335" width="100" height="50" rx="6" fill="#fff7ed" stroke="#a16207"/>
  <text x="330" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">Brun</text>
  <text x="330" y="372" text-anchor="middle" font-size="10" fill="#92400e">(+ vit/brun)</text>

  <rect x="350" y="335" width="100" height="50" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="400" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">Vit/blå</text>
  <text x="400" y="372" text-anchor="middle" font-size="10" fill="#166534">(+ vit/orange)</text>

  <rect x="420" y="335" width="100" height="50" rx="6" fill="#fff7ed" stroke="#ea580c"/>
  <text x="470" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">Orange</text>
  <text x="470" y="372" text-anchor="middle" font-size="10" fill="#c2410c">SCL</text>

  <rect x="490" y="335" width="100" height="50" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="540" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Blå</text>
  <text x="540" y="372" text-anchor="middle" font-size="10" fill="#1d4ed8">SDA</text>

  <!-- ADDR note -->
  <rect x="40" y="90" width="210" height="160" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="145" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">I2C-adress (ADDR)</text>
  <text x="55" y="145" font-size="12" fill="#334155">0x44 — ADDR → GND</text>
  <text x="55" y="165" font-size="12" fill="#334155">0x45 — ADDR → VDD</text>
  <text x="55" y="185" font-size="12" fill="#334155">0x46 / 0x47 — enligt</text>
  <text x="55" y="202" font-size="12" fill="#334155">modulens dokumentation</text>
  <text x="55" y="230" font-size="11" fill="#64748b">ThermoFlow skannar</text>
  <text x="55" y="245" font-size="11" fill="#64748b">0x44–0x47 vid boot.</text>

  <!-- Warning -->
  <rect x="650" y="90" width="210" height="160" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="755" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Viktigt</text>
  <text x="665" y="145" font-size="12" fill="#7f1d1d">• Endast 3,3 V — inte 5 V</text>
  <text x="665" y="168" font-size="12" fill="#7f1d1d">• Vissa moduler har</text>
  <text x="665" y="185" font-size="12" fill="#7f1d1d">  VIN / 3Vo / GND /</text>
  <text x="665" y="202" font-size="12" fill="#7f1d1d">  SCL / SDA</text>
  <text x="665" y="230" font-size="12" fill="#7f1d1d">• Läs silkscreen på</text>
  <text x="665" y="247" font-size="12" fill="#7f1d1d">  din breakout-kort!</text>

  <rect x="40" y="410" width="820" height="50" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="450" y="432" text-anchor="middle" font-size="12" fill="#1e3a8a">Koppla: Blå→SDA, Orange→SCL, Brun→VCC, GND-ledare (vit/blå + vit/orange)→GND.</text>
  <text x="450" y="450" text-anchor="middle" font-size="12" fill="#1e3a8a">Flera sensorer: samma fyra signaler parallellt; skilj adresser med ADDR-pin.</text>
</svg>
